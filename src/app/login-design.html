<body class="flex flex-col min-h-screen text-on-surface">
<!-- TopNavBar: Execution of JSON style_ keys -->
<header class="bg-surface-container-low flex justify-between items-center px-margin py-md w-full fixed top-0 z-50">
<div class="font-h2 text-h2 font-bold text-primary">InternTrack</div>
<div class="flex gap-lg items-center">
<button class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary-fixed transition-colors duration-200">Login</button>
<button class="bg-primary-container text-on-primary-container font-label-sm text-label-sm px-lg py-sm rounded-lg font-bold scale-95 duration-100 active:scale-90">Sign Up</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-2xl pb-2xl px-margin">
<!-- Login Card Container -->
<div class="w-full max-w-md bg-surface-container-high rounded-xl border border-outline-variant p-xl shadow-2xl">
<!-- Branding/Heading -->
<div class="text-center mb-xl">
<h1 class="font-h2 text-h2 text-primary mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your career trajectory.</p>
</div>
<!-- Role Selection Toggle -->
<div class="flex bg-surface-container-low p-base rounded-full mb-xl border border-outline-variant">
<button class="flex-1 py-sm rounded-full font-label-sm text-label-sm transition-all duration-200 bg-primary-container text-on-primary-container font-bold">
                    Student
                </button>
<button class="flex-1 py-sm rounded-full font-label-sm text-label-sm transition-all duration-200 text-on-surface-variant hover:text-on-surface">
                    Company
                </button>
</div>
<!-- Login Form -->
<form class="space-y-lg">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs ml-base">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg pl-2xl pr-md py-md font-body-md text-body-md focus:outline-none focus:border-primary-container transition-colors text-on-surface placeholder:text-on-surface-variant/50" placeholder="name@company.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-xs ml-base">
<label class="font-label-sm text-label-sm text-on-surface-variant">Password</label>
<a class="font-caption text-caption text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg pl-2xl pr-md py-md font-body-md text-body-md focus:outline-none focus:border-primary-container transition-colors text-on-surface placeholder:text-on-surface-variant/50" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-sm py-xs">
<input class="w-base h-base rounded border-outline-variant bg-surface-container-highest text-primary-container focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-caption text-caption text-on-surface-variant" for="remember">Keep me logged in for 30 days</label>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-lg rounded-xl font-h3 text-h3 font-bold hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Register</a>
</p>
</div>
<!-- Social Auth Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-caption uppercase">
<span class="bg-surface-container-high px-md text-on-surface-variant">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-surface-container-highest border border-outline-variant py-md rounded-lg hover:bg-surface-bright transition-colors">

<span class="font-label-sm text-label-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-sm bg-surface-container-highest border border-outline-variant py-md rounded-lg hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined text-body-md">terminal</span>
<span class="font-label-sm text-label-sm">SSO</span>
</button>
</div>
</div>

<div class="flex flex-wrap justify-center gap-lg">

<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Help Center</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Us</a>
</div>
